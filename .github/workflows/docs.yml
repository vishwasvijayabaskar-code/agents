name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "ARCHITECTURE.md"
      - "CONTRIBUTING.md"
      - "config.yaml"
      - "scripts/gen_config_docs.py"
      - "scripts/sync_docs.py"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install mkdocs-material pyyaml
      - name: Build site
        run: |
          python3 scripts/gen_config_docs.py
          python3 scripts/sync_docs.py
          mkdocs build --strict
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
