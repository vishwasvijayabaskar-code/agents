name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-mock pytest-cov ruff mypy

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy helpers/ nodes/ state.py main.py graph.py mcp_server.py web/ watch.py evals/

      - name: CONFIG.md up to date
        run: python3 scripts/gen_config_docs.py --check

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short --cov --cov-report=term-missing --cov-fail-under=60
