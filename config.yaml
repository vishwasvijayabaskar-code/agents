models:
  orchestrator: ollama/qwen3:32b
  coder: ollama/qwen2.5-coder:32b
  researcher: ollama/deepseek-r1:14b
  fast: ollama/qwen2.5:7b
  claude: claude-sonnet-4-6

limits:
  max_iterations: 3
  max_task_chars: 10000
  session_result_chars: 3000
  project_max_bytes: 150000
  max_tokens_per_task: 0  # 0 = unlimited. Set e.g. 50000 to enforce budget
  cache_ttl_hours: 24     # 0 = disable result caching

executor:
  enabled: true
  timeout: 60
  blocked_patterns:
    - "rm -rf"
    - "rm -r"
    - "sudo"
    - "mkfs"
    - "dd if="
    - "chmod 777"
    - "shutdown"
    - "reboot"

researcher:
  max_search_results: 5
  max_page_fetches: 2
  max_page_chars: 5000
  summarize_pages: true  # compress fetched pages with fast model before injection
