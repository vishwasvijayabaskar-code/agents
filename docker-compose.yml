version: "3.8"

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # GPU support (uncomment for NVIDIA):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  agents:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_API_BASE=http://ollama:11434
      - ORCHESTRATOR_MODEL=${ORCHESTRATOR_MODEL:-ollama/llama3.2}
      - CODER_MODEL=${CODER_MODEL:-ollama/qwen2.5-coder:32b}
      - RESEARCHER_MODEL=${RESEARCHER_MODEL:-ollama/deepseek-r1:14b}
      - FAST_MODEL=${FAST_MODEL:-ollama/qwen2.5:7b}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-6}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - ./output:/app/output
      - ./sessions:/app/sessions
    depends_on:
      - ollama

volumes:
  ollama_data:
