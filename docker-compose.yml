services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    # GPU support (uncomment for NVIDIA):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  agents:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_API_BASE=http://ollama:11434
      - ORCHESTRATOR_MODEL=${ORCHESTRATOR_MODEL:-ollama/llama3.2}
      - CODER_MODEL=${CODER_MODEL:-ollama/qwen2.5-coder:32b}
      - RESEARCHER_MODEL=${RESEARCHER_MODEL:-ollama/deepseek-r1:14b}
      - FAST_MODEL=${FAST_MODEL:-ollama/qwen2.5:7b}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-6}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - WEB_AUTH_TOKEN=${WEB_AUTH_TOKEN:-}
      - WEB_SECRET_KEY=${WEB_SECRET_KEY:-}
    volumes:
      - ./output:/app/output
      - ./sessions:/app/sessions
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy

# NOTE: pull models into the ollama volume before first use, e.g.:
#   docker compose up -d ollama
#   docker compose exec ollama ollama pull qwen2.5:7b
#   docker compose exec ollama ollama pull qwen2.5-coder:32b

volumes:
  ollama_data:
