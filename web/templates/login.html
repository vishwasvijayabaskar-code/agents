<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>agents — login</title>
  <style>
    :root {
      --bg: #0d1117; --surface: #161b22; --border: #30363d;
      --accent: #58a6ff; --text: #e6edf3; --muted: #8b949e;
      --code-bg: #1f2428; --radius: 8px; --danger: #f85149;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 40px 36px; width: 360px;
    }
    .logo {
      font-size: 22px; font-weight: 700; margin-bottom: 28px;
      color: var(--text); text-align: center;
    }
    .logo span { color: var(--accent); }
    label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 6px;
            font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
    input[type=password] {
      width: 100%; background: var(--code-bg); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text); font-size: 14px;
      padding: 10px 14px; outline: none; margin-bottom: 16px;
      transition: border-color 0.15s;
    }
    input[type=password]:focus { border-color: var(--accent); }
    button {
      width: 100%; padding: 10px; background: var(--accent); color: #0d1117;
      font-size: 13px; font-weight: 600; border: none; border-radius: var(--radius);
      cursor: pointer; transition: opacity 0.15s;
    }
    button:hover { opacity: 0.88; }
    .error { color: var(--danger); font-size: 12px; margin-bottom: 14px; text-align: center; }
    .note { color: var(--muted); font-size: 11px; margin-top: 16px; text-align: center; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">agent<span>s</span></div>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter password" autofocus required>
      <button type="submit">Sign in</button>
    </form>
    <div class="note">Set <code>web.auth_token</code> in config.yaml to change password</div>
  </div>
</body>
</html>
