<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}agents{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --accent: #58a6ff;
      --accent2: #7ee787;
      --warn: #d29922;
      --danger: #f85149;
      --text: #e6edf3;
      --muted: #8b949e;
      --code-bg: #1f2428;
      --radius: 8px;
      --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Nav */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 24px;
      height: 48px;
    }
    nav .logo {
      font-weight: 700;
      font-size: 16px;
      color: var(--text);
      letter-spacing: -0.3px;
    }
    nav .logo span { color: var(--accent); }
    nav a {
      color: var(--muted);
      font-size: 13px;
      padding: 4px 0;
      border-bottom: 2px solid transparent;
    }
    nav a:hover, nav a.active {
      color: var(--text);
      text-decoration: none;
      border-bottom-color: var(--accent);
    }

    /* Layout */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
    }

    /* Forms */
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
    textarea, input[type=text], select {
      width: 100%;
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    textarea:focus, input[type=text]:focus, select:focus {
      border-color: var(--accent);
    }
    textarea { resize: vertical; min-height: 80px; font-family: var(--font-mono); }
    select option { background: var(--code-bg); }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:hover { opacity: 0.88; }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--accent); color: #0d1117; }
    .btn-secondary { background: var(--border); color: var(--text); }
    .btn[disabled] { opacity: 0.5; cursor: not-allowed; }

    /* Output */
    #output {
      font-family: var(--font-mono);
      font-size: 13px;
      white-space: pre-wrap;
      word-break: break-word;
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      min-height: 200px;
      max-height: 600px;
      overflow-y: auto;
      line-height: 1.7;
    }
    #output.empty { color: var(--muted); }
    .agent-tag {
      display: inline-block;
      background: var(--accent);
      color: #0d1117;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      letter-spacing: 0.5px;
      margin-right: 6px;
    }

    /* Status indicator */
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
      min-height: 22px;
    }
    .spinner {
      width: 12px; height: 12px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .spinner.active { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Tables */
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 8px 12px; color: var(--muted); font-weight: 500; border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
    td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    /* Badges */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-blue  { background: rgba(88,166,255,0.15); color: var(--accent); }
    .badge-green { background: rgba(126,231,135,0.15); color: var(--accent2); }
    .badge-warn  { background: rgba(210,153,34,0.15);  color: var(--warn); }

    /* Misc */
    .muted { color: var(--muted); }
    .mono  { font-family: var(--font-mono); }
    h2 { font-size: 18px; font-weight: 600; margin-bottom: 20px; }
    h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .error-text { color: var(--danger); }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav>
    <span class="logo">agent<span>s</span></span>
    <a href="/" {% if request.url.path == "/" %}class="active"{% endif %}>Run</a>
    <a href="/history" {% if request.url.path == "/history" %}class="active"{% endif %}>History</a>
    <a href="/stats" {% if request.url.path == "/stats" %}class="active"{% endif %}>Stats</a>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
